<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Center — Financial Education & Guides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .hero { padding: 60px 0 30px; text-align: center; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3rem); margin: 0 0 15px; }
    .hero em { color: var(--green-bright); font-style: normal; }
    .hero p { color: var(--slate); max-width: 600px; margin: 0 auto 30px; }
    
    .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 40px 0; }
    .article-card { background: #fff; border: 1px solid var(--line-light); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.3s; }
    .article-card:hover { border-color: var(--green); box-shadow: 0 4px 12px rgba(63, 163, 116, 0.1); transform: translateY(-2px); }
    .article-tag { display: inline-block; background: rgba(63, 163, 116, 0.1); color: var(--green); font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; margin-bottom: 10px; font-weight: 600; }
    .article-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 8px; color: var(--ink); }
    .article-desc { font-size: 0.9rem; color: var(--slate); line-height: 1.5; margin: 0; }
    .article-meta { font-size: 0.8rem; color: var(--slate-dim); margin-top: 12px; }
    
    .nav { background: transparent; padding: 14px 0; border-bottom: 1px solid rgba(14, 26, 36, 0.03); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; }
    .brand { font-weight: 700; display: flex; gap: 8px; cursor: pointer; }
    .brand span { width: 10px; height: 10px; background: var(--green-bright); border-radius: 50%; }
    .nav-links { display: flex; gap: 8px; }
    .nav-link { background: transparent; border: none; padding: 8px 12px; cursor: pointer; color: var(--slate); transition: all 0.2s; }
    .nav-link:hover { color: var(--green); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="wrap nav-inner">
      <div class="brand" onclick="location.href='../index.html'">
        <span></span> Debt Freedom
      </div>
      <div class="nav-links">
        <button class="nav-link" onclick="location.href='../index.html'">Calculator</button>
        <button class="nav-link" onclick="location.href='dashboard.html'">Dashboard</button>
        <button class="nav-link" onclick="location.href='learn.html'" style="color: var(--green-bright); font-weight: 700;">Learn</button>
        <button class="nav-link" onclick="location.href='tools.html'">Tools</button>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="wrap">
      <h1>Financial <em>Education</em></h1>
      <p>Learn everything you need to know about debt payoff, investing, budgeting, and building wealth. Free guides and strategies from financial experts.</p>
    </div>
  </section>

  <div class="wrap">
    <div class="articles-grid" id="articlesGrid"></div>
  </div>

  <script src="../js/utils.js"></script>
  <script>
    const articles = [
      {
        id: 1,
        title: 'Avalanche vs Snowball: Which Debt Strategy Wins?',
        description: 'Compare the two most popular debt payoff methods. Learn which one saves you the most money and which keeps you motivated.',
        category: 'Debt Payoff',
        readTime: '8 min read',
        content: 'The avalanche method focuses on paying off the highest-interest debt first, mathematically optimal for saving the most money. The snowball method targets the smallest balance first, providing quick psychological wins...'
      },
      {
        id: 2,
        title: 'Building an Emergency Fund While Paying Debt',
        description: 'Should you save while paying debt? Learn the strategic balance between emergency funds and aggressive debt payoff.',
        category: 'Savings',
        readTime: '6 min read',
        content: 'Financial experts recommend having 3-6 months of expenses in an emergency fund before aggressively paying debt...'
      },
      {
        id: 3,
        title: 'Credit Score Myths Debunked',
        description: 'Understand what really impacts your credit score and what doesn\'t. Learn how to improve your score while paying off debt.',
        category: 'Credit',
        readTime: '7 min read',
        content: 'Your credit score is determined by: Payment history (35%), Credit utilization (30%), Length of history (15%), Credit mix (10%), New inquiries (10%)...'
      },
      {
        id: 4,
        title: 'The Psychology of Money and Motivation',
        description: 'Why do some people stick to their debt payoff plan while others quit? The psychology behind financial behavior.',
        category: 'Mindset',
        readTime: '9 min read',
        content: 'Behavioral finance shows that quick wins matter more than pure math. This is why the snowball method works so well...'
      },
      {
        id: 5,
        title: 'Investing 101: Starting Your Journey',
        description: 'Once debt is paid off, how do you invest? Learn the basics of stocks, bonds, ETFs, and compound growth.',
        category: 'Investing',
        readTime: '12 min read',
        content: 'The stock market has historically returned 8-10% annually over the long term. Starting with index funds is the safest approach for beginners...'
      },
      {
        id: 6,
        title: 'Avoiding Common Debt Payoff Mistakes',
        description: 'Learn from others\' mistakes. The top 5 errors that derail debt payoff plans and how to avoid them.',
        category: 'Debt Payoff',
        readTime: '5 min read',
        content: 'Mistake #1: Accumulating new debt while paying off old debt. Mistake #2: Not tracking progress...'
      },
      {
        id: 7,
        title: 'Negotiating Lower Interest Rates',
        description: 'Call your credit card companies and negotiate. Even 1% lower interest saves you thousands.',
        category: 'Debt Payoff',
        readTime: '4 min read',
        content: 'You have more power than you think. Creditors would rather work with you than have you default...'
      },
      {
        id: 8,
        title: 'Lifestyle Changes That Accelerate Payoff',
        description: 'Find hundreds of dollars monthly without cutting essentials. Smart lifestyle hacks for faster debt elimination.',
        category: 'Budget',
        readTime: '10 min read',
        content: 'The 50/30/20 rule: 50% needs, 30% wants, 20% debt and savings. Most people can find $100-300 monthly by optimizing...'
      }
    ];

    function renderArticles() {
      const grid = document.getElementById('articlesGrid');
      articles.forEach(article => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.onclick = () => showArticle(article);
        card.innerHTML = `
          <span class="article-tag">${article.category}</span>
          <h3 class="article-title">${article.title}</h3>
          <p class="article-desc">${article.description}</p>
          <div class="article-meta">${article.readTime}</div>
        `;
        grid.appendChild(card);
      });
    }

    function showArticle(article) {
      alert(`${article.title}\n\n${article.content}\n\n${article.readTime}`);
    }

    renderArticles();
  </script>
</body>
</html>
